name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle y generar wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Generar gradle-wrapper.jar
        run: gradle wrapper --gradle-version 8.6

      - name: Permisos gradlew
        run: chmod +x gradlew

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Subir APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Borrar release y tag anteriores (para poder sobreescribir)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-debug --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push --delete origin latest-debug 2>/dev/null || true

      - name: Publicar Release con APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "IPTV Player - Debug APK"
          body: |
            APK actualizado automáticamente.
            Commit: ${{ github.event.head_commit.message }}
            Fecha: ${{ github.run_id }}
          prerelease: false
          make_latest: true
          files: app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mostrar info APK
        run: |
          echo "✅ APK compilado:"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
